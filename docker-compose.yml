services:
  prowlarr:
    image: linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=501
      - PGID=20
      - TZ=America/Chicago
    volumes:
      - ~/docker/configs/prowlarr:/config
    ports:
      - "9696:9696"
    restart: unless-stopped
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - SERVER_COUNTRIES=Netherlands
    ports:
      - "8080:8080" # qBittorrent WebUI
      - "6881:6881" # qBittorrent torrents
      - "6881:6881/udp"
    restart: unless-stopped
  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    environment:
      - PUID=501
      - PGID=20
      - TZ=America/Chicago
      - WEBUI_PORT=8080
    volumes:
      - ~/docker/configs/qbittorrent:/config
      - /Volumes/T7/media:/media
    restart: unless-stopped
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - TZ=America/Chicago
    ports:
      - "8191:8191"
    restart: unless-stopped
  radarr:
    image: linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=501
      - PGID=20
      - TZ=America/Chicago
    volumes:
      - ~/docker/configs/radarr:/config
      - /Volumes/T7/media:/media
    ports:
      - "7878:7878"
    restart: unless-stopped
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=501
      - PGID=20
      - TZ=America/Chicago
    volumes:
      - ./configs/sonarr:/config
      - /Volumes/T7/media:/media
    ports:
      - 8989:8989
    restart: unless-stopped
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      - PUID=501
      - PGID=20
      - TZ=America/Chicago
    volumes:
      - ./configs/lidarr:/config
      - /Volumes/T7/media:/media
    ports:
      - 8686:8686
    restart: unless-stopped
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=501
      - PGID=20
      - TZ=America/Chicago
    volumes:
      - ./configs/jellyfin:/config
      - /Volumes/T7/media:/media
    ports:
      - 8096:8096
    restart: unless-stopped
  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    environment:
      - TZ=America/Chicago
    volumes:
      - ./configs/jellyseerr:/app/config
    ports:
      - 5055:5055
    restart: unless-stopped
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCHEDULE=0 0 4 * * *
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_NO_RESTART=false
    restart: unless-stopped

  # ============================================================
  # Phase 3: Life Admin & Budgeting
  # ============================================================

  redis:
    image: docker.io/library/redis:7
    container_name: redis
    restart: unless-stopped
    volumes:
      - ~/docker/configs/redis:/data

  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless
    restart: unless-stopped
    depends_on:
      - redis
      - gotenberg
      - tika
    ports:
      - 8000:8000
    volumes:
      - ~/docker/configs/paperless/data:/usr/src/paperless/data
      - ~/docker/configs/paperless/media:/usr/src/paperless/media
      - ~/docker/configs/paperless/export:/usr/src/paperless/export
      - ~/docker/configs/paperless/consume:/usr/src/paperless/consume
    environment:
      PAPERLESS_REDIS: redis://redis:6379
      PAPERLESS_TIME_ZONE: America/Chicago
      PAPERLESS_OCR_LANGUAGE: eng+rus+ukr
      PAPERLESS_OCR_LANGUAGES: rus ukr
      PAPERLESS_FILENAME_FORMAT: "{{ created_year }}/{{ correspondent }}/{{ title }}"
      PAPERLESS_CONSUMER_POLLING: 30
      PAPERLESS_CONSUMER_RECURSIVE: "true"
      PAPERLESS_TRASH_DIR: /usr/src/paperless/media/trash
      PAPERLESS_TIKA_ENABLED: 1
      PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://gotenberg:3000
      PAPERLESS_TIKA_ENDPOINT: http://tika:9998
      USERMAP_UID: 1000
      USERMAP_GID: 1000

  gotenberg:
    image: docker.io/gotenberg/gotenberg:8
    container_name: gotenberg
    restart: unless-stopped
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--chromium-allow-list=file:///tmp/.*"

  tika:
    image: docker.io/apache/tika:latest
    container_name: tika
    restart: unless-stopped

  actual-budget:
    image: actualbudget/actual-server:latest
    container_name: actual-budget
    restart: unless-stopped
    ports:
      - 5006:5006
    volumes:
      - ~/docker/configs/actual-budget:/data

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - 8888:8080
    volumes:
      - ~/docker/configs/searxng:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
      - SEARXNG_SECRET=${SEARXNG_SECRET}
    restart: unless-stopped

  vane:
    image: itzcrazykns1337/vane:slim-latest
    container_name: vane
    ports:
      - 3001:3000
    environment:
      - SEARXNG_API_URL=http://searxng:8080
    volumes:
      - vane-data:/home/vane/data
    depends_on:
      - searxng
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    restart: unless-stopped

volumes:
  vane-data:
