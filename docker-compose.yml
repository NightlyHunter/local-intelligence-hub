services:
  prowlarr:
    image: linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=501
      - PGID=20
      - TZ=America/Chicago
    volumes:
      - ~/docker/configs/prowlarr:/config
    ports:
      - "9696:9696"
    restart: unless-stopped

  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - SERVER_COUNTRIES=Netherlands
    ports:
      - "8080:8080"      # qBittorrent WebUI
      - "6881:6881"      # qBittorrent torrents
      - "6881:6881/udp"
    restart: unless-stopped

  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    environment:
      - PUID=501
      - PGID=20
      - TZ=America/Chicago
      - WEBUI_PORT=8080
    volumes:
      - ~/docker/configs/qbittorrent:/config
      - /Volumes/T7/media/downloads:/downloads
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - TZ=America/Chicago
    ports:
      - "8191:8191"
    restart: unless-stopped

  radarr:
    image: linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=501
      - PGID=20
      - TZ=America/Chicago
    volumes:
      - ~/docker/configs/radarr:/config
      - /Volumes/T7/media:/media
    ports:
      - "7878:7878"
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=501
      - PGID=20
      - TZ=America/Chicago
    volumes:
      - ./configs/sonarr:/config
      - /Volumes/T7/media:/media
    ports:
      - 8989:8989
    restart: unless-stopped

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      - PUID=501
      - PGID=20
      - TZ=America/Chicago
    volumes:
      - ./configs/lidarr:/config
      - /Volumes/T7/media:/media
    ports:
      - 8686:8686
    restart: unless-stopped

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=501
      - PGID=20
      - TZ=America/Chicago
    volumes:
      - ./configs/jellyfin:/config
      - /Volumes/T7/media:/media
    ports:
      - 8096:8096
    restart: unless-stopped

  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    environment:
      - TZ=America/Chicago
    volumes:
      - ./configs/jellyseerr:/app/config
    ports:
      - 5055:5055
    restart: unless-stopped
